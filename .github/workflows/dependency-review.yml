name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Disallow GPL family licenses for inbound deps to avoid copyleft
          # contamination of an Apache-2.0 codebase. Adjust per project.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
