name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to least-privilege; jobs that need more must opt in explicitly.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run baseline checks
        run: ./scripts/check.sh

      - name: Hello world
        run: ./scripts/hello.sh

  node:
    name: Node (lint, format, test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Format check (Biome)
        run: pnpm format:check

      - name: Test (Vitest)
        run: pnpm test
